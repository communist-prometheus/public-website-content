<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#f8fafc" rx="8"/>

  <text x="400" y="40" text-anchor="middle" fill="#334155" font-family="system-ui, sans-serif" font-size="20" font-weight="600">Component Architecture</text>

  <!-- Layout layer -->
  <rect x="280" y="70" width="240" height="50" rx="8" fill="#6366f1" opacity="0.9"/>
  <text x="400" y="100" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="500">BaseLayout</text>

  <!-- Pages -->
  <line x1="340" y1="120" x2="200" y2="160" stroke="#94a3b8" stroke-width="2"/>
  <line x1="400" y1="120" x2="400" y2="160" stroke="#94a3b8" stroke-width="2"/>
  <line x1="460" y1="120" x2="600" y2="160" stroke="#94a3b8" stroke-width="2"/>

  <rect x="100" y="160" width="200" height="45" rx="8" fill="#8b5cf6" opacity="0.85"/>
  <text x="200" y="187" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">Home Page</text>

  <rect x="300" y="160" width="200" height="45" rx="8" fill="#8b5cf6" opacity="0.85"/>
  <text x="400" y="187" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">Blog Listing</text>

  <rect x="500" y="160" width="200" height="45" rx="8" fill="#8b5cf6" opacity="0.85"/>
  <text x="600" y="187" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">Blog Post</text>

  <!-- Features -->
  <line x1="200" y1="205" x2="200" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <line x1="400" y1="205" x2="350" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <line x1="400" y1="205" x2="450" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <line x1="600" y1="205" x2="600" y2="250" stroke="#94a3b8" stroke-width="2"/>

  <rect x="100" y="250" width="200" height="45" rx="8" fill="#ec4899" opacity="0.8"/>
  <text x="200" y="277" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">NewsSection</text>

  <rect x="250" y="250" width="200" height="45" rx="8" fill="#ec4899" opacity="0.8"/>
  <text x="350" y="277" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">CategoryFilter</text>

  <rect x="350" y="250" width="200" height="45" rx="8" fill="#ec4899" opacity="0.8"/>
  <text x="450" y="277" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">PostCard</text>

  <rect x="500" y="250" width="200" height="45" rx="8" fill="#ec4899" opacity="0.8"/>
  <text x="600" y="277" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">BlogPicture</text>

  <!-- Shared -->
  <line x1="450" y1="295" x2="400" y2="340" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="600" y1="295" x2="600" y2="340" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>

  <rect x="300" y="340" width="200" height="45" rx="8" fill="#f59e0b" opacity="0.85"/>
  <text x="400" y="367" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">CpCard / CpButton</text>

  <rect x="500" y="340" width="200" height="45" rx="8" fill="#f59e0b" opacity="0.85"/>
  <text x="600" y="367" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13">Image Presets</text>

  <!-- Content layer -->
  <rect x="200" y="420" width="400" height="50" rx="8" fill="#10b981" opacity="0.85"/>
  <text x="400" y="450" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Content Collection (Markdown + Assets)</text>
  <line x1="400" y1="385" x2="400" y2="420" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="600" y1="385" x2="500" y2="420" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Legend -->
  <rect x="30" y="430" width="12" height="12" rx="2" fill="#6366f1"/>
  <text x="48" y="441" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Layout</text>
  <rect x="30" y="450" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="48" y="461" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Pages</text>
  <rect x="30" y="470" width="12" height="12" rx="2" fill="#ec4899"/>
  <text x="48" y="481" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Features</text>
</svg>
